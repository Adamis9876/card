<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Hirsch - Links</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #161616;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        .profile-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #282828;
            margin-bottom: -90px;
            z-index: 2;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: slideIntoPlace 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes slideIntoPlace {
            from {
                transform: translateY(-130px) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card {
            background-color: #242424;
            width: 100%;
            max-width: 550px;
            border-radius: 40px;
            padding: 110px 40px 40px 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .divider {
            width: 130px;
            height: 4px;
            background-color: #72aee6;
            margin: 0 auto 35px auto;
            border-radius: 2px;
        }

        .contact-list {
            list-style: none;
            margin-bottom: 40px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.15rem;
            color: #72aee6;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .contact-item:hover {
            opacity: 0.8;
        }

        .contact-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .payment-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .payment-method {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.85rem;
            opacity: 0.9;
            transition: transform 0.2s;
        }

        .payment-method:hover {
            transform: translateY(-2px);
        }

        .payment-icon {
            width: 45px;
            height: 45px;
            background-color: #ffffff;
            color: #242424;
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 1.6rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .payment-method.venmo .payment-icon {
            color: #3D95CE;
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: 900;
            font-size: 1.75rem;
        }

        .payment-method.paypal .payment-icon {
            color: #003087;
            font-family: Georgia, serif;
            font-style: italic;
            font-weight: 900;
            font-size: 1.75rem;
        }

        .payment-method.cashapp .payment-icon {
            color: #00C853;
            font-size: 1.85rem;
        }


        .footer-note {
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        .footer-highlight {
            font-size: 1.3rem;
            font-weight: 700;
        }
    </style>
</head>
<body>


    <div class="profile-container">
        <img src="https://firebasestorage.googleapis.com/v0/b/sitch-app.appspot.com/o/userFiles%2FJFoKy7YPgtRQvwWLzXGaJyRwtPR2%2FC8oxNrFc6r7UlZ313Jnu%2Fsmall_eSJBZayeN9gqB6tx8cge.webp?alt=media&amp;token=12c73b24-20d5-4fea-848f-bdd01109e5f7" alt="Adam Hirsch">
    </div>

    <div class="card">
        <h1>Adam Hirsch</h1>
        <div class="divider"></div>


        <div class="contact-list">
            <a href="#" class="contact-item" onclick="addToContacts(event)">
                <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>Add to Contacts</span>
            </a>
            <a href="tel:2069100010" class="contact-item">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <span>(206) 910–0010</span>
            </a>
        </div>


        <div class="payment-grid">
            <a href="https://cash.app/$Adanius" target="_blank" class="payment-method cashapp">
                <div class="payment-icon">$</div>
                <span>Cash App</span>
            </a>
            <a href="https://venmo.com/u/Adamis9876" target="_blank" class="payment-method venmo">
                <div class="payment-icon">V</div>
                <span>Venmo</span>
            </a>
            <a href="https://paypal.me/Adamis9876" target="_blank" class="payment-method paypal">
                <div class="payment-icon">P</div>
                <span>PayPal</span>
            </a>
        </div>

        <p class="footer-note">Thanks for helping me pay for school 😁</p>
        <p class="footer-highlight">Enjoy your cruise!</p>
    </div>

    <script>
        function addToContacts(e) {
            e.preventDefault();
            const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Adam Hirsch
ORG:Alaska Coach Tours
TEL;TYPE=CELL:(206) 910-0010
END:VCARD`;
            const blob = new Blob([vcard], {type: 'text/vcard'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Adam_Hirsch.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
