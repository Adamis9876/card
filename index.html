<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Adam Hirsch - VCard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            color: #ffffff;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Background layer */
        #bg-layer {
            position: fixed;
            inset: 0;
            width: 100vw;
            width: 100dvw;
            height: 100vh;
            height: 100dvh;
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0;
            transition: opacity 1.4s ease;

            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: transform, opacity;
        }

        /* Subtle dark overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.30);
            z-index: 0;
            pointer-events: none;
        }

        .profile-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #161616;
            margin-bottom: -90px;
            z-index: 20;
            box-shadow: 0 12px 35px rgba(0,0,0,0.8);
            animation: slideIntoPlace 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }
        @keyframes slideIntoPlace {
            from {
                transform: translateY(-130px) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card {
            background-color: #161616;
            width: 100%;
            max-width: 550px;
            border-radius: 40px;
            padding: 110px 40px 40px 40px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 10;
            border: 1px solid #222222;
            position: relative;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .divider {
            width: 130px;
            height: 4px;
            background-color: #72aee6;
            margin: 0 auto 35px auto;
            border-radius: 2px;
        }
        .contact-list {
            list-style: none;
            margin-bottom: 40px;
        }
        .contact-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 14px 32px;
            background-color: #72aee6;
            color: #161616;
            border-radius: 30px;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(114, 174, 230, 0.2);
        }
        .contact-item:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 174, 230, 0.4);
        }
        .contact-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .payment-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        .payment-method {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #ffffff;
            font-size: 0.85rem;
            opacity: 0.9;
            transition: transform 0.2s;
        }
        .payment-method:hover {
            transform: translateY(-2px);
        }
        .payment-icon {
            width: 45px;
            height: 45px;
            background-color: #ffffff;
            border-radius: 8px;
            display: grid;
            place-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .payment-icon img {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }
        .footer-note {
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .footer-highlight {
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        /* Visitor Counter Styles */
        .visitor-counter {
            position: absolute;
            bottom: 12px;
            left: 15px;
            font-size: 0.75rem;
            color: #777777;
            z-index: 30;
        }
    </style>

<script src="https://cdn.jsdelivr.net/npm/counterapi/dist/counter.browser.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const hasVisited = localStorage.getItem('hasVisitedVCard');
            const counterElement = document.getElementById('view-count');
            
            const counter = new Counter({ workspace: 'adamhir-com' });

            if (!hasVisited) {
                counter.up('sitch-app-vcard')
                    .then(result => {
                        counterElement.innerText = result.data.up_count;
                        localStorage.setItem('hasVisitedVCard', 'true');
                    })
                    .catch(error => {
                        console.error('Counter error:', error);
                        counterElement.innerText = "-";
                    });
            } else {
                counter.get('sitch-app-vcard')
                    .then(result => {
                        counterElement.innerText = result.data.up_count;
                    })
                    .catch(error => {
                        console.error('Counter error:', error);
                        counterElement.innerText = "-";
                    });
            }
        });
    </script>
